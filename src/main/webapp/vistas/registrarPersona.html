<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Persona</title>

<link rel="stylesheet" href="../css/style.css">

</head>
<body>

<nav class="navbar-custom">

    <div class="logo">Padrón Nacional Electoral</div>

    <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="buscarPersona.html">Buscar Persona</a>
        <a href="registrarPersona.html">Registrar Persona</a>
        <a href="consultaEstado.html">Consultar Estado</a>
    </div>

    <button class="btn-logout">Cerrar Sesión</button>

</nav>

<div class="container">

    <div class="card form-card">

        <h2>Registrar Persona</h2>

        <form>

            <div class="form-group">
                <label>DNI</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Apellido</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Fecha Nacimiento</label>
                <input type="date">
            </div>

            <div class="form-group">
                <label>Sexo</label>

                <select>
                    <option>Masculino</option>
                    <option>Femenino</option>
                    <option>X</option>
                </select>
            </div>

            <div class="form-group">
                <label>Domicilio</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Foto</label>
                <input type="file">
            </div>

            <button class="btn btn-success">
                Registrar Persona
            </button>

        </form>

    </div>

</div>

</body>
</html>

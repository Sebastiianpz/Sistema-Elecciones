<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<nav class="navbar-custom">
    <div class="logo">Padrón Nacional Electoral</div>


<div class="menu">
    <a href="dashboard.html">Dashboard</a>
    <a href="buscarPersona.html">Buscar Persona</a>
    <a href="registrarPersona.html">Registrar Persona</a>
    <a href="consultaEstado.html">Consultar Estado</a>
</div>

<button class="btn-logout">Cerrar Sesión</button>


</nav>

<div class="container">

<div class="cards">

    <div class="card">
        <h3>Registrados</h3>
        <h1>1250</h1>
    </div>

    <div class="card">
        <h3>Habilitados</h3>
        <h1>1180</h1>
    </div>

    <div class="card">
        <h3>Inhabilitados</h3>
        <h1>70</h1>
    </div>

</div>

<div class="chart">
    <h2>Estado del Padrón</h2>

    <canvas id="grafico" width="1" height="1"></canvas>
</div>


</div>

<script>
new Chart(document.getElementById('grafico'),{
    type:'pie',
    data:{
        labels:['Habilitados','Inhabilitados'],
        datasets:[{
            data:[1180,70]
        }]
    }
});
</script>

</body>
</html>
